<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Simples</title>
    <link rel="stylesheet" href="pomodoro.css">
    <link rel="icon" href="/assets/path58.png" type="image/png">
</head>

<body>

    <div class="dropdown">
        <button>
            <img src="/logos_google/menu_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">
        </button>
        <div class="menu">
            <a href="/frontend/conta.html"> <img src="/logos_google/person_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Conta"></a>
            <a href="/frontend/achivments.html"> <img src="/logos_google/star_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="Conquistas"></a>
            <a href="/frontend/teste.html"> <img src="/logos_google/book_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt=""></a>
        </div>
    </div>

    <div class="container">
        <h1><b>Pomodoro</b></h1>

        <div id="timer">25:00</div>
        <!-- Tempo inicial: 25 minutos -->

        <button class="start" onclick="startTimer()">
            <img src="/logos_google/play_arrow_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="">
        </button>
        <!-- chama função startTimer ao clicar -->

        <button class="pause" onclick="pauseTimer()">
            <img src="/logos_google/pause_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="">
        </button>
        <!-- chama função pauseTimer -->

        <button class="reset" onclick="resetTimer()">
            <img src="/logos_google/refresh_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" alt="">
        </button>
        <!-- chama função resetTimer -->
         <p id="tempo-total" style="margin-top:10px; font-size:14px;"></p>
    </div>

      <script src="pomodoro.js">
        
        </script>
    
</body>

</html>
